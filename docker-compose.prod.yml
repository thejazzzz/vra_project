version: "3.8"

services:
    postgres:
        image: postgres:15
        restart: always
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-vra}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vra}
            POSTGRES_DB: ${POSTGRES_DB:-vra}
        # Do not expose ports to the outside world in production if possible
        # ports:
        #    - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        networks:
            - vra_net

    chroma:
        image: chromadb/chroma:latest
        restart: always
        # Chroma is accessed internally by the API
        volumes:
            - chroma_data:/chroma/
        networks:
            - vra_net

    redis:
        image: redis:7-alpine
        restart: always
        command: redis-server --requirepass ${REDIS_PASSWORD:-secure_redis_password}
        volumes:
            - redis_data:/data
        networks:
            - vra_net

    api:
        build: .
        container_name: vra_api
        restart: always
        depends_on:
            - postgres
            - chroma
            - redis
        ports:
            - "8000:8000"
        environment:
            APP_ENV: production

            # Vector DB
            CHROMA_SERVER: http://chroma:8000

            # Database
            POSTGRES_HOST: postgres
            POSTGRES_USER: ${POSTGRES_USER:-vra}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vra}
            POSTGRES_DB: ${POSTGRES_DB:-vra}

            # Redis
            REDIS_PASSWORD: ${REDIS_PASSWORD:-secure_redis_password}
            REDIS_URL: ${REDIS_URL:-redis://:secure_redis_password@redis:6379/0}

            # AI Providers
            OPENAI_API_KEY: ${OPENAI_API_KEY}
            OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
            OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
            OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-pro-exp-02-05:free}

            # LLM Routing
            VRA_HYBRID_MODE: ${VRA_HYBRID_MODE:-true}
            PRIMARY_PROVIDER: ${PRIMARY_PROVIDER:-openai}
            SECONDARY_PROVIDER: ${SECONDARY_PROVIDER:-openrouter}
            MAX_CLOUD_CALLS: ${MAX_CLOUD_CALLS:-20}
            REPORT_PROVIDER: ${REPORT_PROVIDER:-openai}

            # Research
            SEMANTIC_SCHOLAR_API_KEY: ${SEMANTIC_SCHOLAR_API_KEY}

            # Email
            SMTP_HOST: ${SMTP_HOST}
            SMTP_PORT: ${SMTP_PORT:-587}
            SMTP_USER: ${SMTP_USER}
            SMTP_PASSWORD: ${SMTP_PASSWORD}
            EMAIL_FROM: ${EMAIL_FROM}

            # Auth
            NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}

            # Frontend / CORS
            FRONTEND_URL: ${FRONTEND_URL}
            ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}

        networks:
            - vra_net
volumes:
    postgres_data:
    chroma_data:
    redis_data:

networks:
    vra_net:
