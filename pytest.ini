[pytest]
# Enforce the project root as the root directory for tests
testpaths = tests

# Standardize output for CI/CD and production readiness
# Using 'short' traceback to avoid long absolute path listings
addopts = --tb=short --strict-markers

# Logging configuration
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
